const STORAGE_KEY = "pokopia-tracker-v1";

function getTodayKey() {
  return new Date().toISOString().slice(0, 10);
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

// ---- CheckCircle ----
function CheckCircle({ checked, onToggle, color, emoji, disabled, title }) {
  return (
    <button onClick={disabled ? undefined : onToggle} title={title} style={{
      width: 32, height: 32, borderRadius: "50%",
      display: "flex", alignItems: "center", justifyContent: "center",
      background: checked ? color : "transparent",
      border: `2px solid ${checked ? color : "#ddd"}`,
      cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.3 : 1,
      transform: checked ? "scale(1.1)" : "scale(1)",
      transition: "all 0.15s ease",
      flexShrink: 0,
    }}>
      {checked ? <span style={{ fontSize: 14 }}>{emoji}</span> : null}
    </button>
  );
}

// ---- ProgressBar ----
function ProgressBar({ value, max, color }) {
  const pct = max > 0 ? (value / max) * 100 : 0;
  return (
    <div style={{ width: 80, height: 6, background: "rgba(0,0,0,0.1)", borderRadius: 3, overflow: "hidden", flexShrink: 0 }}>
      <div style={{ height: "100%", borderRadius: 3, width: `${pct}%`, background: color, transition: "width 0.3s ease" }} />
    </div>
  );
}

// ---- StatBadge ----
function StatBadge({ label, value, total, color, emoji }) {
  const pct = total > 0 ? Math.round((value / total) * 100) : 0;
  return (
    <div style={{ flex: "1 1 110px", background: "rgba(255,255,255,0.08)", border: `1px solid ${color}40`, borderRadius: 12, padding: "10px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
      <div style={{ fontSize: 18 }}>{emoji}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color, lineHeight: 1 }}>{value}<span style={{ fontSize: 13, fontWeight: 400, opacity: 0.6 }}>/{total}</span></div>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)", textAlign: "center" }}>{label}</div>
      <div style={{ fontSize: 11, fontWeight: 700, color }}>{pct}%</div>
    </div>
  );
}

// ---- PokemonRow ----
function PokemonRow({ pokemon, state, onToggle, color }) {
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "1fr 36px 36px 36px",
      alignItems: "center", padding: "4px 14px", gap: 6,
      borderRadius: 8, margin: "1px 6px",
      background: state.met ? color + "0d" : "transparent",
      transition: "background 0.1s",
    }}>
      <span style={{ fontSize: 14, fontWeight: state.met ? 700 : 400, color: "#2c2c2c", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        {pokemon.name}
      </span>
      <CheckCircle checked={state.met} onToggle={() => onToggle(pokemon.id, "met")} color="#4a9a6e" emoji="👋" title={state.met ? "Kennengelernt" : "Noch nicht kennengelernt"} />
      <CheckCircle checked={state.hasHouse} onToggle={() => onToggle(pokemon.id, "hasHouse")} color="#e8a045" emoji="🏠" disabled={!state.met} title={state.met ? (state.hasHouse ? "Haus vorhanden" : "Noch kein Haus") : "Erst kennenlernen"} />
      <CheckCircle checked={state.moodToday} onToggle={() => onToggle(pokemon.id, "mood")} color="#d4607a" emoji="💬" disabled={!state.met} title={state.met ? (state.moodToday ? "Heute gefragt" : "Noch nicht gefragt") : "Erst kennenlernen"} />
    </div>
  );
}

// ---- Main App ----
function App() {
  const [data, setData] = React.useState(() => loadData());
  const [openWorlds, setOpenWorlds] = React.useState(() => WORLDS.reduce((a, w) => ({ ...a, [w.id]: false }), {}));
  const [search, setSearch] = React.useState("");
  const [filter, setFilter] = React.useState("all");

  React.useEffect(() => { saveData(data); }, [data]);

  const toggle = React.useCallback((pokemonId, field) => {
    setData(prev => {
      const key = String(pokemonId);
      const today = getTodayKey();
      if (field === "mood") {
        const current = prev[key]?.moodDates || {};
        const newDates = current[today]
          ? Object.fromEntries(Object.entries(current).filter(([d]) => d !== today))
          : { ...current, [today]: true };
        return { ...prev, [key]: { ...prev[key], moodDates: newDates } };
      }
      return { ...prev, [key]: { ...prev[key], [field]: !prev[key]?.[field] } };
    });
  }, []);

  const getState = React.useCallback((id) => {
    const p = data[String(id)] || {};
    const today = getTodayKey();
    return { hasHouse: !!p.hasHouse, met: !!p.met, moodToday: !!(p.moodDates || {})[today] };
  }, [data]);

  const toggleWorld = (id) => setOpenWorlds(prev => ({ ...prev, [id]: !prev[id] }));

  const totalPokemon = WORLDS.reduce((s, w) => s + w.pokemon.length, 0);
  const metCount = WORLDS.reduce((s, w) => s + w.pokemon.filter(p => data[String(p.id)]?.met).length, 0);
  const houseCount = WORLDS.reduce((s, w) => s + w.pokemon.filter(p => data[String(p.id)]?.hasHouse).length, 0);
  const today = getTodayKey();
  const moodCount = WORLDS.reduce((s, w) => s + w.pokemon.filter(p => (data[String(p.id)]?.moodDates || {})[today]).length, 0);

  const filterPokemon = (pokemon) => {
    if (search && !pokemon.name.toLowerCase().includes(search.toLowerCase())) return false;
    const state = getState(pokemon.id);
    if (filter === "missing-house") return state.met && !state.hasHouse;
    if (filter === "missing-met") return !state.met;
    if (filter === "needs-check") return state.met && !state.moodToday;
    return true;
  };

  const FILTERS = [
    { id: "all", label: "Alle" },
    { id: "missing-met", label: "Noch unbekannt" },
    { id: "missing-house", label: "Ohne Haus" },
    { id: "needs-check", label: "Heute noch fragen" },
  ];

  return (
    <div style={{ fontFamily: "'Nunito', 'Segoe UI', sans-serif", background: "#faf9f7", minHeight: "100vh" }}>

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", padding: "0 0 18px", position: "sticky", top: 0, zIndex: 10, boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>
        <div style={{ maxWidth: 860, margin: "0 auto", padding: "18px 16px 0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
            <span style={{ fontSize: 38 }}>🎮</span>
            <div>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: "#fff", letterSpacing: "-0.5px" }}>Pokopia Tracker</h1>
              <p style={{ fontSize: 12, color: "rgba(255,255,255,0.55)", marginTop: 2 }}>Deine Pokémon-Übersicht für alle Welten</p>
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            <StatBadge label="Kennengelernt" value={metCount} total={totalPokemon} color="#4a9a6e" emoji="👋" />
            <StatBadge label="Mit Haus" value={houseCount} total={totalPokemon} color="#e8a045" emoji="🏠" />
            <StatBadge label="Heute gefragt" value={moodCount} total={metCount} color="#d4607a" emoji="💬" />
          </div>

          <input
            type="text" placeholder="🔍 Pokémon suchen…" value={search}
            onChange={e => setSearch(e.target.value)}
            style={{ width: "100%", padding: "9px 14px", borderRadius: 10, border: "none", fontSize: 14, background: "rgba(255,255,255,0.12)", color: "#fff", outline: "none", marginBottom: 8 }}
          />
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {FILTERS.map(f => (
              <button key={f.id} onClick={() => setFilter(f.id)} style={{
                padding: "5px 11px", borderRadius: 20, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
                border: `1px solid ${filter === f.id ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.25)"}`,
                background: filter === f.id ? "rgba(255,255,255,0.2)" : "transparent",
                color: filter === f.id ? "#fff" : "rgba(255,255,255,0.7)",
                fontWeight: filter === f.id ? 700 : 400,
                transition: "all 0.15s",
              }}>{f.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* WORLD SECTIONS */}
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "18px 12px", display: "flex", flexDirection: "column", gap: 12 }}>
        {WORLDS.map(world => {
          const sorted = [...world.pokemon].sort((a, b) => a.name.localeCompare(b.name, "de"));
          const filtered = sorted.filter(filterPokemon);
          if ((search || filter !== "all") && filtered.length === 0) return null;
          const displayList = (search || filter !== "all") ? filtered : sorted;
          const worldMet = world.pokemon.filter(p => data[String(p.id)]?.met).length;
          const isOpen = openWorlds[world.id];

          return (
            <div key={world.id} style={{ borderRadius: 16, border: `1px solid ${world.color}40`, background: world.bg, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>

              {/* World header button */}
              <button onClick={() => toggleWorld(world.id)} style={{
                width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "13px 16px", cursor: "pointer", border: "none", textAlign: "left",
                fontFamily: "inherit", gap: 12,
                background: world.color + "18",
                borderBottom: isOpen ? `2px solid ${world.color}30` : "none",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
                  <span style={{ fontSize: 26 }}>{world.emoji}</span>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: world.color }}>{world.name}</div>
                    <div style={{ fontSize: 12, color: "#888", marginTop: 1 }}>{worldMet}/{world.pokemon.length} kennengelernt</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                  <ProgressBar value={worldMet} max={world.pokemon.length} color={world.color} />
                  <span style={{ fontSize: 20, color: world.color, transition: "transform 0.2s", display: "inline-block", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
                </div>
              </button>

              {/* Pokemon list */}
              {isOpen && (
                <div style={{ padding: "6px 0 10px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 36px 36px 36px", padding: "4px 14px 6px", gap: 6, borderBottom: "1px solid rgba(0,0,0,0.06)", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.5px" }}>Pokémon</span>
                    <span style={{ fontSize: 13, textAlign: "center" }} title="Kennengelernt">👋</span>
                    <span style={{ fontSize: 13, textAlign: "center" }} title="Hat ein Haus">🏠</span>
                    <span style={{ fontSize: 13, textAlign: "center" }} title="Heute gefragt">💬</span>
                  </div>
                  {displayList.map(pokemon => (
                    <PokemonRow key={pokemon.id} pokemon={pokemon} state={getState(pokemon.id)} onToggle={toggle} color={world.color} />
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ textAlign: "center", padding: "20px", fontSize: 12, color: "#bbb" }}>
        Daten werden lokal im Browser gespeichert · {totalPokemon} Pokémon in {WORLDS.length} Welten
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
